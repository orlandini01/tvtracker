# Sobe só o Postgres localmente. O backend roda direto via uvicorn
# (fora do Docker) durante o desenvolvimento, para ter hot-reload rápido.
# O Dockerfile do backend é usado no deploy (Railway/Render), não aqui.
services:
  db:
    image: postgres:16-alpine
    container_name: tvtracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tvtracker
      POSTGRES_PASSWORD: tvtracker
      POSTGRES_DB: tvtracker
    ports:
      - "5432:5432"
    volumes:
      - tvtracker_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tvtracker"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tvtracker_pgdata:
